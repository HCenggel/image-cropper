<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImageCropper 完整功能演示</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }
    .header h1 {
      margin: 0;
      font-size: 2.5em;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    .header p {
      margin: 10px 0 0;
      font-size: 1.1em;
      opacity: 0.9;
    }
    .main-container {
      display: flex;
      gap: 20px;
      background: white;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .left-panel {
      flex: 0 0 220px;
      background: #f8f9fa;
      border-radius: 10px;
      padding: 20px;
    }
    .center-panel {
      flex: 1;
      min-width: 250px;
    }
    .right-panel {
      flex: 0 0 auto;
    }
    .panel-title {
      font-size: 18px;
      font-weight: bold;
      color: #333;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #667eea;
    }
    .control-group {
      margin-bottom: 18px;
    }
    .control-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #555;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 10px 15px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    button:active {
      transform: translateY(0);
    }
    button.secondary {
      background: #6c757d;
    }
    button.warning {
      background: #ffc107;
      color: #333;
    }
    button.success {
      background: #28a745;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }
    input[type="file"] {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border: 2px dashed #ccc;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }
    input[type="file"]:hover {
      border-color: #667eea;
    }
    select, input[type="number"], input[type="range"] {
      width: 100%;
      padding: 8px 12px;
      margin-bottom: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    select:focus, input[type="number"]:focus, input[type="range"]:focus {
      outline: none;
      border-color: #667eea;
    }
    .preview-container {
      margin-top: 20px;
      text-align: center;
    }
    .preview-container img {
      max-width: 100%;
      border: 3px solid #667eea;
      border-radius: 10px;
      margin-top: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .info {
      margin-top: 15px;
      padding: 15px;
      background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6;
    }
    .info strong {
      color: #1976d2;
    }
    .canvas-wrapper {
      display: inline-block;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .stats {
      margin-top: 10px;
      padding: 10px;
      background: #fff3cd;
      border-radius: 8px;
      font-size: 12px;
    }
    .stats-item {
      margin-bottom: 5px;
    }
    .stats-item label {
      font-weight: bold;
      color: #856404;
    }
    .tips {
      margin-top: 20px;
      padding: 15px;
      background: #d4edda;
      border-radius: 8px;
      font-size: 13px;
      border-left: 4px solid #28a745;
    }
    .tips h4 {
      margin: 0 0 10px 0;
      color: #155724;
    }
    .tips ul {
      margin: 0;
      padding-left: 20px;
      color: #155724;
    }
    .tips li {
      margin-bottom: 5px;
    }
    .divider {
      height: 1px;
      background: #e0e0e0;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🖼️ ImageCropper</h1>
    <p>纯JavaScript图片裁剪库 - 完整功能演示</p>
  </div>

  <div class="main-container">
    <!-- 左侧：导出预览面板 -->
    <div class="left-panel">
      <div class="panel-title">📤 导出预览</div>
      <div class="control-group">
        <label>格式</label>
        <select id="exportFormat">
          <option value="image/jpeg">JPEG</option>
          <option value="image/png">PNG</option>
        </select>
      </div>
      <div class="control-group">
        <label>质量 (0.1 - 1.0)</label>
        <input type="number" id="exportQuality" min="0.1" max="1.0" step="0.1" value="0.9">
      </div>
      <button class="success" id="exportBtn">✨ 导出图片</button>
      <button class="secondary" id="downloadBtn">⬇️ 下载图片</button>

      <div class="preview-container">
        <div id="preview"></div>
      </div>

      <div class="info" id="info">
        <p>加载图片后可查看导出信息</p>
      </div>

      <div class="divider"></div>

      <div class="panel-title">📊 裁剪信息</div>
      <div class="stats" id="cropStats">
        <div class="stats-item"><label>位置:</label> <span id="cropPos">-</span></div>
        <div class="stats-item"><label>尺寸:</label> <span id="cropSize">-</span></div>
      </div>
    </div>

    <!-- 中间：控制面板 -->
    <div class="center-panel">
      <div class="panel-title">🖼️ 图片加载</div>
      <div class="control-group">
        <label>选择图片</label>
        <input type="file" id="imageInput" accept="image/*">
      </div>

      <div class="divider"></div>

      <div class="panel-title">✂️ 裁剪模式</div>
      <div class="control-group">
        <label>模式选择</label>
        <select id="cropMode">
          <option value="free">自由模式 (可调整大小)</option>
          <option value="fixed">固定模式 (150x150)</option>
        </select>
      </div>

      <div class="divider"></div>

      <div class="panel-title">🔄 图片变换</div>
      <div class="control-group">
        <label>旋转</label>
        <button id="rotateLeft">↺ 向左 90°</button>
        <button id="rotateRight">↻ 向右 90°</button>
      </div>
      <div class="control-group">
        <label>翻转</label>
        <button id="flipHorizontal">↔️ 水平翻转</button>
        <button id="flipVertical">↕️ 垂直翻转</button>
      </div>
      <div class="control-group">
        <label>缩放</label>
        <input type="range" id="scaleSlider" min="0.1" max="10" step="0.1" value="1">
        <div style="text-align: center; font-size: 14px; color: #666;">
          当前缩放: <strong id="scaleValue">1.0x</strong>
        </div>
      </div>

      <div class="divider"></div>

      <div class="panel-title">⚙️ 其他操作</div>
      <button class="warning" id="resetBtn">🔄 重置</button>
      <button class="secondary" id="loadSampleBtn">🎲 加载示例图片</button>
    </div>

    <!-- 右侧：裁剪画布 -->
    <div class="right-panel">
      <div class="panel-title">🎯 裁剪画布</div>
      <div class="canvas-wrapper">
        <div id="cropper"></div>
      </div>
    </div>
  </div>

  <div class="tips">
    <h4>💡 使用提示</h4>
    <ul>
      <li>拖动图片可以移动图片位置</li>
      <li>滚轮可以缩放图片（0.1x - 10x）</li>
      <li>自由模式下可以拖动裁剪框的8个手柄调整大小</li>
      <li>点击裁剪框可以移动裁剪框位置</li>
      <li>支持JPEG和PNG格式导出，质量可调</li>
      <li>导出后可以下载保存图片</li>
    </ul>
  </div>

  <script src="../image-cropper.min.js"></script>
  <script>
    // 创建裁剪器实例
    const cropper = new ImageCropper('#cropper', {
      width: 500,
      height: 500,
      cropMode: 'free',
      cropSize: { width: 150, height: 150 },
      rotateIncrement: 90,
      onCropChange: (cropData) => {
        updateCropStats(cropData);
      }
    });

    // 获取DOM元素
    const imageInput = document.getElementById('imageInput');
    const cropModeSelect = document.getElementById('cropMode');
    const rotateLeftBtn = document.getElementById('rotateLeft');
    const rotateRightBtn = document.getElementById('rotateRight');
    const flipHorizontalBtn = document.getElementById('flipHorizontal');
    const flipVerticalBtn = document.getElementById('flipVertical');
    const resetBtn = document.getElementById('resetBtn');
    const loadSampleBtn = document.getElementById('loadSampleBtn');
    const exportBtn = document.getElementById('exportBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const exportFormat = document.getElementById('exportFormat');
    const exportQuality = document.getElementById('exportQuality');
    const scaleSlider = document.getElementById('scaleSlider');
    const scaleValue = document.getElementById('scaleValue');
    const preview = document.getElementById('preview');
    const info = document.getElementById('info');
    const cropPos = document.getElementById('cropPos');
    const cropSize = document.getElementById('cropSize');

    let currentExportData = null;

    // 加载图片
    imageInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = async (event) => {
          await cropper.loadImage(event.target.result);
          resetScaleSlider();
          showInfo('图片加载成功！', 'success');
        };
        reader.onerror = () => {
          showInfo('图片加载失败！', 'error');
        };
        reader.readAsDataURL(file);
      }
    });

    // 裁剪模式切换
    cropModeSelect.addEventListener('change', (e) => {
      cropper.setCropMode(e.target.value);
      showInfo(`已切换到${e.target.value === 'free' ? '自由' : '固定'}模式`, 'success');
    });

    // 旋转
    rotateLeftBtn.addEventListener('click', () => {
      cropper.rotate(-90);
      showInfo('向左旋转 90°', 'info');
    });

    rotateRightBtn.addEventListener('click', () => {
      cropper.rotate(90);
      showInfo('向右旋转 90°', 'info');
    });

    // 翻转
    flipHorizontalBtn.addEventListener('click', () => {
      cropper.flipHorizontal();
      showInfo('水平翻转', 'info');
    });

    flipVerticalBtn.addEventListener('click', () => {
      cropper.flipVertical();
      showInfo('垂直翻转', 'info');
    });

    // 缩放滑块
    scaleSlider.addEventListener('input', (e) => {
      const scale = parseFloat(e.target.value);
      cropper.setScale(scale);
      scaleValue.textContent = scale.toFixed(1) + 'x';
    });

    // 重置
    resetBtn.addEventListener('click', () => {
      cropper.reset();
      resetScaleSlider();
      showInfo('已重置所有变换', 'info');
    });

    // 加载示例图片
    loadSampleBtn.addEventListener('click', () => {
      const sampleImage = 'data:image/svg+xml,' + encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
          <rect width="400" height="400" fill="#f0f0f0"/>
          <circle cx="200" cy="200" r="100" fill="#667eea"/>
          <rect x="100" y="100" width="200" height="200" fill="#764ba2" opacity="0.5"/>
          <text x="200" y="210" text-anchor="middle" font-size="24" fill="white">示例图片</text>
        </svg>
      `);
      cropper.loadImage(sampleImage).then(() => {
        resetScaleSlider();
        showInfo('示例图片加载成功！', 'success');
      });
    });

    // 导出图片
    exportBtn.addEventListener('click', () => {
      try {
        const format = exportFormat.value;
        const quality = parseFloat(exportQuality.value);
        const dataUrl = cropper.export(format, quality);
        currentExportData = dataUrl;
        
        preview.innerHTML = `<img src="${dataUrl}" alt="导出的图片">`;
        
        const formatName = format === 'image/png' ? 'PNG' : 'JPEG';
        showInfo(
          `✅ 导出成功！<br>
           <strong>格式:</strong> ${formatName}<br>
           <strong>质量:</strong> ${quality}<br>
           <strong>Base64长度:</strong> ${dataUrl.length.toLocaleString()} 字符`,
          'success'
        );
      } catch (error) {
        showInfo('❌ 请先加载图片', 'error');
      }
    });

    // 下载图片
    downloadBtn.addEventListener('click', () => {
      if (!currentExportData) {
        showInfo('❌ 请先导出图片', 'error');
        return;
      }
      
      const format = exportFormat.value;
      const extension = format === 'image/png' ? 'png' : 'jpg';
      const link = document.createElement('a');
      link.download = `cropped-image.${extension}`;
      link.href = currentExportData;
      link.click();
      
      showInfo('✅ 图片下载开始', 'success');
    });

    // 更新裁剪统计信息
    function updateCropStats(cropData) {
      cropPos.textContent = `(${Math.round(cropData.x)}, ${Math.round(cropData.y)})`;
      cropSize.textContent = `${Math.round(cropData.width)} x ${Math.round(cropData.height)}`;
    }

    // 重置缩放滑块
    function resetScaleSlider() {
      scaleSlider.value = 1;
      scaleValue.textContent = '1.0x';
    }

    // 显示信息
    function showInfo(message, type = 'info') {
      const colors = {
        info: 'linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%)',
        success: 'linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%)',
        error: 'linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%)'
      };
      info.style.background = colors[type];
      info.innerHTML = message;
    }
  </script>
</body>
</html>
